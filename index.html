<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展覽支線解謎驗證系統 v2</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }
        body {
            background-color: #121214;
            color: #e2e8f0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: #1e1e24;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #2d2d35;
            margin-bottom: 20px;
        }
        h1 {
            text-align: center;
            color: #f59e0b;
            font-size: 22px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .hidden {
            display: none !important;
        }

        /* --- 主畫面：6 關任務列表 --- */
        .quest-list {
            margin-bottom: 25px;
        }
        .quest-card {
            background: #2a2a35;
            border: 1px solid #3f3f46;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .quest-card:hover {
            border-color: #f59e0b;
            background: #323242;
            transform: translateY(-2px);
        }
        .quest-title {
            font-weight: bold;
            font-size: 14px;
        }
        .quest-status {
            font-size: 12px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .status-locked {
            background: #3f3f46;
            color: #cbd5e1;
        }
        .status-unlocked {
            background: #064e3b;
            color: #34d399;
        }

        /* --- 主畫面：3x2 碎片拼圖區 --- */
        .puzzle-section {
            border-top: 1px solid #3f3f46;
            padding-top: 20px;
            text-align: center;
        }
        .puzzle-section h3 {
            color: #f59e0b;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 改為 3 欄 */
            gap: 8px;
            width: 240px;
            height: 160px; /* 3x2 的比例 */
            margin: 0 auto 15px auto;
            border: 2px dashed #4b5563;
            padding: 6px;
            background: #141416;
            border-radius: 8px;
        }
        .puzzle-piece {
            background: #27272a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.5s ease;
            color: #52525b;
            font-weight: bold;
        }
        .puzzle-piece.unlocked {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #fff;
            box-shadow: inset 0 0 8px rgba(255,255,255,0.6);
        }

        /* --- 主畫面：終極獎勵兌換券 --- */
        .reward-banner {
            background: linear-gradient(135deg, #059669, #047857);
            border: 2px solid #34d399;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            animation: pulse 2s infinite;
        }
        .reward-banner h2 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 8px;
        }

        /* --- 子畫面：單一謎題與照片顯示頁面 --- */
        .quest-view h2 {
            color: #f59e0b;
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
        }
        .quest-hint-text {
            text-align: center;
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 15px;
        }
        /* 圖片容器與樣式 */
        .image-container {
            width: 100%;
            max-height: 250px;
            overflow: hidden;
            border-radius: 8px;
            border: 2px solid #3f3f46;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #141416;
        }
        .quest-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓圖片漂亮填滿 */
        }
        
        .input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
        }
        input[type="text"] {
            width: 100%;
            max-width: 280px;
            background: #0f0f11;
            border: 2px solid #4b5563;
            border-radius: 8px;
            padding: 14px;
            color: #fff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
        }
        input[type="text"]:focus {
            border-color: #f59e0b;
            outline: none;
        }
        button {
            width: 100%;
            max-width: 280px;
            background: #f59e0b;
            color: #121214;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #d97706;
        }
        .btn-back {
            background: #4b5563;
            color: #fff;
            margin-top: 5px;
        }

        .msg {
            width: 100%;
            max-width: 280px;
            text-align: center;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        .msg-error {
            background: #7f1d1d;
            color: #fca5a5;
            border: 1px solid #991b1b;
        }
        .msg-success {
            background: #064e3b;
            color: #a7f3d0;
            border: 1px solid #065f46;
            line-height: 1.6;
            text-align: left;
            max-width: 100%;
            padding: 18px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .reset-box {
            text-align: center;
            margin-top: 10px;
        }
        .btn-reset {
            background: transparent;
            color: #4b5563;
            font-size: 11px;
            border: none;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="main-menu">
            <h1>【探索展區】支線任務終端機</h1>
            <p class="subtitle">根據照片提示尋找展場線索，收集 6 個碎片</p>
            
            <div class="quest-list">
                <div class="quest-card" onclick="openQuest('q1')">
                    <span class="quest-title">任務 01：神秘的保險箱</span>
                    <span id="badge-q1" class="quest-status status-locked">🔒 未解鎖</span>
                </div>
                <div class="quest-card" onclick="openQuest('q2')">
                    <span class="quest-title">任務 02：古老的時鐘</span>
                    <span id="badge-q2" class="quest-status status-locked">🔒 未解鎖</span>
                </div>
                <div class="quest-card" onclick="openQuest('q3')">
                    <span class="quest-title">任務 03：隱藏的壁畫</span>
                    <span id="badge-q3" class="quest-status status-locked">🔒 未解鎖</span>
                </div>
                <div class="quest-card" onclick="openQuest('q4')">
                    <span class="quest-title">任務 04：抽屜的夾層</span>
                    <span id="badge-q4" class="quest-status status-locked">🔒 未解鎖</span>
                </div>
                <div class="quest-card" onclick="openQuest('q5')">
                    <span class="quest-title">任務 05：神祕的盆栽</span>
                    <span id="badge-q5" class="quest-status status-locked">🔒 未解鎖</span>
                </div>
                <div class="quest-card" onclick="openQuest('q6')">
                    <span class="quest-title">任務 06：接待台的角落</span>
                    <span id="badge-q6" class="quest-status status-locked">🔒 未解鎖</span>
                </div>
            </div>

            <div class="puzzle-section">
                <h3>🧩 目前收集的圖騰碎片</h3>
                <div class="puzzle-grid">
                    <div id="piece-q1" class="puzzle-piece">碎片 1</div>
                    <div id="piece-q2" class="puzzle-piece">碎片 2</div>
                    <div id="piece-q3" class="puzzle-piece">碎片 3</div>
                    <div id="piece-q4" class="puzzle-piece">碎片 4</div>
                    <div id="piece-q5" class="puzzle-piece">碎片 5</div>
                    <div id="piece-q6" class="puzzle-piece">碎片 6</div>
                </div>
            </div>

            <div id="reward-zone" class="reward-banner hidden">
                <h2>🎉 成功集滿 6 張碎片！</h2>
                <p>請向展覽現場工作人員出示此畫面<br>即可領取「精美主題小禮物」乙份！</p>
            </div>
        </div>

        <div id="quest-view" class="quest-view hidden">
            <h2 id="current-quest-title">支線任務</h2>
            <p class="quest-hint-text">🔍 提示：請在展場中尋找照片所示的地點或道具</p>
            
            <div class="image-container">
                <img id="current-quest-img" class="quest-image" src="" alt="任務提示照片">
            </div>
            
            <div class="input-container">
                <div id="input-area" class="input-container">
                    <input type="text" id="password-input" placeholder="請輸入四位數密碼" autocomplete="off">
                    <button onclick="verifyPassword()">提交驗證</button>
                </div>

                <div id="feedback-msg" class="msg hidden"></div>

                <button class="btn-back" onclick="goBack()">返回主選單</button>
            </div>
        </div>
    </div>

    <div class="reset-box">
        <button class="btn-reset" onclick="resetGame()">重設所有進度 (測試用)</button>
    </div>

    <script>
        // 🛠 在這裡修改：6個關卡的名稱、密碼、解鎖後的文字，以及【照片網址】
        const questData = {
            q1: {
                title: "任務 01：",
                answer: "1984",
                imgUrl: "https://images.unsplash.com/photo-1582139329536-e7284fece509?w=500", // 請換成你們的保險箱照片網址
                story: "💚 恭喜過關！很嚴肅的在打委託信，其實是因為K是電腦白痴 "
            },
            q2: {
                title: "任務 02：",
                answer: "1234",
                imgUrl: "https://images.unsplash.com/photo-1509048191080-d2984bad6ae5?w=500", // 請換成你們的時鐘照片網址
                story: "💚 恭喜過關！為什麼每次都能精準地回覆 "
            },
            q3: {
                title: "任務 03：",
                answer: "5791", 
                imgUrl: "https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?w=500", // 請換成你們的壁畫照片網址
                story: "💚 恭喜過關！關於整域師事務所 "
            },
            q4: {
                title: "任務 04：",
                answer: "8888", 
                imgUrl: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=500", // 請換成你們的抽屜照片網址
                story: "💚 恭喜過關！菜鳥整域師K "
            },
            q5: {
                title: "任務 05： ",
                answer: "9999", 
                imgUrl: "https://images.unsplash.com/photo-1485955900006-10f4d324d411?w=500", // 請換成你們的盆栽照片網址
                story: "💚 恭喜過關！R和K的小故事 "
            },
            q6: {
                title: "任務 06： ",
                answer: "0000", 
                imgUrl: "https://images.unsplash.com/photo-1564507592333-c60657eea523?w=500", // 請換成你們的接待台照片網址
                story: "💚 恭喜過關！你覺得K是怎麼樣的人 "
            }
        };

        let playerProgress = JSON.parse(localStorage.getItem('exhibit_game_progress_v2')) || {
            q1: false, q2: false, q3: false, q4: false, q5: false, q6: false
        };

        let currentActiveQuest = '';

        function initGame() {
            let totalSolved = 0;

            for (let key in playerProgress) {
                const badge = document.getElementById(`badge-${key}`);
                const piece = document.getElementById(`piece-${key}`);
                
                if (playerProgress[key]) {
                    badge.innerText = "✨ 已解鎖";
                    badge.className = "quest-status status-unlocked";
                    piece.classList.add('unlocked');
                    totalSolved++;
                } else {
                    badge.innerText = "🔒 未解鎖";
                    badge.className = "quest-status status-locked";
                    piece.classList.remove('unlocked');
                }
            }

            const rewardZone = document.getElementById('reward-zone');
            if (totalSolved === 6) {
                rewardZone.classList.remove('hidden');
            } else {
                rewardZone.classList.add('hidden');
            }
        }

        function openQuest(questId) {
            currentActiveQuest = questId;
            const data = questData[questId];
            
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('quest-view').classList.remove('hidden');
            
            document.getElementById('current-quest-title').innerText = data.title;
            // 換上該關卡對應的照片網址
            document.getElementById('current-quest-img').src = data.imgUrl;
            
            document.getElementById('password-input').value = '';
            const feedback = document.getElementById('feedback-msg');
            feedback.className = "msg hidden";

            const inputArea = document.getElementById('input-area');
            if (playerProgress[questId]) {
                inputArea.classList.add('hidden');
                feedback.innerText = data.story;
                feedback.className = "msg msg-success";
            } else {
                inputArea.classList.remove('hidden');
            }
        }

        function verifyPassword() {
            const inputVal = document.getElementById('password-input').value.trim();
            const currentQuest = questData[currentActiveQuest];
            const feedback = document.getElementById('feedback-msg');
            const inputArea = document.getElementById('input-area');

            feedback.classList.remove('hidden');

            if (inputVal === currentQuest.answer) {
                playerProgress[currentActiveQuest] = true;
                localStorage.setItem('exhibit_game_progress_v2', JSON.stringify(playerProgress));
                inputArea.classList.add('hidden');
                feedback.innerText = currentQuest.story;
                feedback.className = "msg msg-success";
            } else {
                feedback.innerText = "❌ 密碼錯誤，現場的線索似乎還漏了什麼？";
                feedback.className = "msg msg-error";
            }
        }

        function goBack() {
            document.getElementById('quest-view').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            initGame();
        }

        function resetGame() {
            if(confirm("確定要清除所有通關進度嗎？")) {
                playerProgress = { q1: false, q2: false, q3: false, q4: false, q5: false, q6: false };
                localStorage.setItem('exhibit_game_progress_v2', JSON.stringify(playerProgress));
                initGame();
                alert("進度已重設！");
            }
        }

        initGame();
    </script>
</body>
</html>
